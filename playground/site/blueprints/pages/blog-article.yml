title: Blog Article
num: date
icon: 📖

status:
  draft:
    label: Draft
    text: The note is still in draft mode. It can only be seen by editors with panel access.
  unlisted:
    label: In Review
    text: The note is online and can be visited with the direct URL. The team must still give the final go to publish it.
  listed:
    label: Published
    text: The note is online and listed in the blog

buttons:
  - preview
  - settings
  - content-translator
  - languages
  - status

columns:
  - width: 2/3
    fields:
      subheading:
        type: text
      cover:
        type: files
        max: 1
        uploads:
          template: image
      text:
        type: blocks
        fieldsets:
          text:
            label: Text
            type: text
            icon: text
            fields:
              text:
                type: textarea
                buttons:
                  - headlines
                  - "|"
                  - bold
                  - italic
                  - link
                  - email
                  - file
          heading:
            label: Heading
            type: heading
            icon: title
            fields:
              text:
                type: text
                font: serif
              level:
                label: Level
                type: select
                default: h2
                options:
                  h2: H2
                  h3: H3
                width: 1/6
          stats-grid:
            extends: blocks/stats-grid

  - width: 1/3
    sections:
      meta:
        type: fields
        fields:
          date:
            type: date
            time: false
            display: DD.MM.YYYY
            default: now
            required: true
          author:
            type: users
          tags:
            type: tags
            options:
              type: query
              query: page.siblings.pluck("tags", ",", true)
      images:
        type: files
        template: image
